[General]
; How often (in seconds) the stale subtitle cleanup pass runs.
; Lower values = more responsive cleanup but slightly more overhead.
; Default: 0.5
fCleanupInterval = 0.5

; How long (in seconds) a subtitle can linger before being force removed
; as a last resort, when normal checks have failed (e.g. actor state corrupted
; by death alternative mods). Increase if legitimate long subtitles are being
; cut off unexpectedly.
; Default: 25.0
fStuckSubtitleTimeout = 25.0